name: spooler_tag
description: "NFC tag manager for 3D printer filament spools"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  nfc_manager: ^3.5.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  flex_color_picker: ^3.6.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  custom_lint:
  riverpod_lint:
  mockito: ^5.4.4

flutter:
  uses-material-design: true
